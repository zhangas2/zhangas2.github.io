d">for</span>(int i=0;i&lt;a.size();i++)&#123;</span><br><span class="line">		t+=a[i];</span><br><span class="line">		<span class="keyword">if</span>(i&lt;b.size())&#123;</span><br><span class="line">			t+=b[i];</span><br><span class="line">		&#125;</span><br><span class="line">		c.push_back(t%10);</span><br><span class="line">		t/=10;</span><br><span class="line">	&#125;</span><br><span class="line">	<span class="keyword">if</span>(t)&#123;</span><br><span class="line">		c.push_back(t);</span><br><span class="line">	&#125;</span><br><span class="line">	<span class="built_in">return</span> c;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line">int <span class="function"><span class="title">main</span></span>()&#123;</span><br><span class="line">	string s1,s2;</span><br><span class="line">	cin&gt;&gt;s1&gt;&gt;s2;</span><br><span class="line">	vector&lt;int&gt;a,b;</span><br><span class="line">	<span class="keyword">for</span>(int i=s1.size()-1;i&gt;=0;i--)&#123;</span><br><span class="line">		a.push_back(s1[i]-<span class="string">&#x27;0&#x27;</span>);</span><br><span class="line">	&#125; </span><br><span class="line">	<span class="keyword">for</span>(int i=s2.size()-1;i&gt;=0;i--)&#123;</span><br><span class="line">		b.push_back(s2[i]-<span class="string">&#x27;0&#x27;</span>);</span><br><span class="line">	&#125; 	</span><br><span class="line">	vector&lt;int&gt;c=add(a,b);</span><br><span class="line">	<span class="keyword">for</span>(int i=c.size()-1;i&gt;=0;i--)&#123;</span><br><span class="line">		cout&lt;&lt;<span class="string">c[i];</span></span><br><span class="line"><span class="string">	&#125;</span></span><br><span class="line"><span class="string">	return 0;</span></span><br><span class="line"><span class="string">&#125;</span></span><br></pre></td></tr></table></figure>
